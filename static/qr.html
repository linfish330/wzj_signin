<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>二维码签到</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;800&family=Outfit:wght@400;500;600;700&display=swap');

            :root {
                /* 知见 Design System — CSS Variables & Mappings */
                --color-primary: #4A6741;
                --color-primary-dark: #3A5334;
                --color-primary-light: #6B8E63;
                --color-secondary: #A0522D;
                --color-accent: #8B7355;
                --color-earth: #C4A77D;
                --color-cream: #FAF8F5;
                --color-cream-dark: #F5F2ED;
                --color-text: #3D3229;
                --color-text-light: #6B5D4D;
                --color-text-muted: #766958;
                --color-success: #5B8C5A;
                --color-danger: #A65D4E;
                --color-sky: #5B8A8A;

                --font-family: 'Noto Serif SC', 'Noto Serif', serif;
                --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
                
                --radius-sm: 8px;
                --radius-md: 12px;
                --radius-lg: 16px;
                --radius-full: 9999px;

                --shadow-sm: 0 2px 8px rgba(61, 50, 41, 0.08);
                --shadow-md: 0 4px 16px rgba(61, 50, 41, 0.12);
                --shadow-lg: 0 8px 32px rgba(61, 50, 41, 0.16);

                --transition-fast: 0.15s ease-out;
                --transition-normal: 0.3s ease-out;

                --bg: var(--color-cream);
                --panel: var(--color-cream-dark);
                --panel-strong: #ffffff;
                --text: var(--color-text);
                --muted: var(--color-text-muted);
                --border: rgba(196, 167, 125, 0.25);
                --shadow: var(--shadow-md);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                background:
                    radial-gradient(ellipse at 20% 30%, rgba(107, 142, 99, 0.04) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 70%, rgba(160, 82, 45, 0.04) 0%, transparent 60%),
                    radial-gradient(ellipse at 50% 50%, rgba(139, 115, 85, 0.03) 0%, transparent 70%),
                    var(--bg);
                color: var(--text);
                -webkit-font-smoothing: antialiased;
                line-height: 1.5;
            }

            .wrap {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 28px;
            }

            .card {
                width: min(520px, 100%);
                background: rgba(255, 255, 255, 0.85);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-lg);
                overflow: hidden;
                transition: box-shadow var(--transition-normal), transform var(--transition-normal);
            }

            .card:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 40px rgba(61, 50, 41, 0.15);
            }

            .head {
                padding: 20px 20px 12px 20px;
                display: flex;
                align-items: baseline;
                justify-content: space-between;
                gap: 12px;
                border-bottom: 1px solid rgba(196, 167, 125, 0.15);
                background: var(--color-cream-dark);
            }

            h1 {
                margin: 0;
                font-family: var(--font-family);
                font-size: 18px;
                font-weight: 800;
                color: var(--color-primary-dark);
                letter-spacing: 0.2px;
            }

            .time {
                font-family: var(--font-mono);
                font-size: 12px;
                color: var(--color-text-light);
                white-space: nowrap;
                font-variant-numeric: tabular-nums;
            }

            .body {
                padding: 16px 20px 20px 20px;
                display: grid;
                gap: 16px;
            }

            .hint {
                font-size: 13px;
                color: var(--color-text-light);
                line-height: 1.6;
            }

            .qrbox {
                width: 100%;
                display: grid;
                place-items: center;
                padding: 14px;
                border-radius: var(--radius-md);
                border: 1px solid var(--border);
                background: var(--color-cream-dark);
                min-height: 280px;
                box-shadow: var(--shadow-sm) inset;
            }

            .qrimg {
                width: 240px;
                height: 240px;
                border-radius: var(--radius-md);
                border: 1px solid var(--border);
                background: #ffffff;
                display: none;
                box-shadow: var(--shadow-sm);
            }

            .spinner {
                width: 42px;
                height: 42px;
                border-radius: var(--radius-full);
                border: 3px solid rgba(74, 103, 65, 0.15);
                border-top-color: var(--color-primary);
                animation: spin 0.9s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .row {
                display: flex;
                gap: 12px;
                justify-content: space-between;
                align-items: center;
            }

            /* Buttons (match home page styles) */
            .pill {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: var(--spacing-sm);
                font-weight: 800;
                border-radius: var(--radius-full);
                border: 1px solid var(--color-earth);
                background: var(--color-cream-dark);
                color: var(--color-text);
                padding: 10px 18px;
                font-size: 13px;
                cursor: pointer;
                text-decoration: none;
                transition: all var(--transition-fast);
                will-change: transform;
                flex: 1;
            }

            .pill:hover:not(:disabled) {
                background: var(--color-earth);
                color: white;
                transform: translateY(-2px);
                box-shadow: var(--shadow-sm);
            }

            .pill:active:not(:disabled) {
                transform: translateY(0);
            }

            .pill.primary {
                background: var(--color-primary);
                border-color: var(--color-primary-dark);
                color: white;
            }

            .pill.primary:hover:not(:disabled) {
                background: var(--color-primary-dark);
                box-shadow: var(--shadow-md);
                transform: translateY(-2px);
            }

            .pill:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .ghost {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border: 1px solid var(--color-earth);
                border-radius: var(--radius-full);
                padding: 10px 18px;
                background: transparent;
                color: var(--color-primary);
                font-size: 13px;
                font-weight: 800;
                cursor: pointer;
                text-decoration: none;
                transition: all var(--transition-fast);
                will-change: transform;
                flex: 1;
            }

            .ghost:hover:not(:disabled) {
                background: rgba(74, 103, 65, 0.08);
                border-color: var(--color-primary);
                transform: translateY(-2px);
            }

            .ghost:active:not(:disabled) {
                transform: translateY(0);
            }

            .ghost:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .progress {
                height: 10px;
                background: rgba(139, 115, 85, 0.15);
                border-radius: var(--radius-full);
                overflow: hidden;
                border: 1px solid rgba(196, 167, 125, 0.3);
            }

            .bar {
                height: 100%;
                width: 0%;
                background: var(--color-primary);
                border-radius: var(--radius-full);
                transition: width 0.2s linear;
            }

            .meta {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                font-size: 12.5px;
                color: var(--color-text-light);
                font-weight: 500;
            }

            .mono {
                font-family: var(--font-mono);
                word-break: break-all;
                font-variant-numeric: tabular-nums;
                background: rgba(139, 115, 85, 0.05);
                padding: 1px 4px;
                border-radius: 4px;
                border: 1px solid rgba(139, 115, 85, 0.1);
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="card">
                <div class="head">
                    <h1>二维码签到</h1>
                    <div class="time" id="datetime">--</div>
                </div>

                <div class="body">
                    <div class="hint" id="statusText">正在等待二维码生成（自动刷新中）…</div>

                    <div class="qrbox">
                        <div class="spinner" id="spinner" aria-label="Loading"></div>
                        <img id="qrcodeImage" class="qrimg" alt="扫描此二维码签到" />
                    </div>

                    <div class="meta">
                        <div>
                            signId：<span class="mono" id="signIdText">--</span>
                        </div>
                        <div>剩余：<span id="countdown">--</span></div>
                    </div>

                    <div class="progress"><div class="bar" id="progressBar"></div></div>

                    <div class="row">
                        <button class="pill primary" id="refreshBtn" type="button">手动刷新</button>
                        <button class="ghost" id="copyBtn" type="button">复制二维码链接</button>
                    </div>

                    <div class="hint mono" id="qrcodeText">（二维码链接会显示在这里）</div>
                </div>
            </div>
        </div>

        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const sign = urlParams.get("sign") || "";
            const course = urlParams.get("course") || "";

            const statusText = document.getElementById("statusText");
            const datetimeEl = document.getElementById("datetime");
            const signIdText = document.getElementById("signIdText");
            const countdownEl = document.getElementById("countdown");
            const progressBar = document.getElementById("progressBar");
            const qrcodeText = document.getElementById("qrcodeText");
            const qrcodeImage = document.getElementById("qrcodeImage");
            const spinner = document.getElementById("spinner");
            const refreshBtn = document.getElementById("refreshBtn");
            const copyBtn = document.getElementById("copyBtn");

            signIdText.textContent = sign || "--";

            let lastQrUrl = "";
            let triedFallback = false;
            let cycleStartAt = 0;
            let lastCycleIndex = 0;
            const TTL_MS = 10 * 1000;

            function updateTime() {
                const now = new Date();
                const timeString = now.toLocaleTimeString("zh-CN", { hour12: false });
                const dateString = now.toLocaleDateString("zh-CN");
                datetimeEl.textContent = `${dateString} ${timeString}`;
            }

            async function safeReadJson(response) {
                try {
                    return await response.json();
                } catch {
                    return null;
                }
            }

            function renderQr(qrUrl) {
                qrcodeText.textContent = qrUrl;
                triedFallback = false;
                // 优先直接显示（若 qrUrl 本身就是图片地址/ dataURL，这一步就能直接出图）
                qrcodeImage.dataset.mode = "direct";
                qrcodeImage.src = qrUrl;
                qrcodeImage.style.display = "block";
                spinner.style.display = "none";
            }

            // 若 direct 模式加载失败（例如 qrUrl 不是图片），自动回退为“把链接编码成二维码”
            qrcodeImage.addEventListener("error", () => {
                if (triedFallback) return;
                if (qrcodeImage.dataset.mode !== "direct") return;
                if (!lastQrUrl) return;

                triedFallback = true;
                qrcodeImage.dataset.mode = "encoded";
                qrcodeImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(lastQrUrl)}`;
            });

            function renderWaiting() {
                qrcodeImage.style.display = "none";
                spinner.style.display = "block";
                qrcodeText.textContent = "（二维码链接会显示在这里）";
            }

            function tickCountdown() {
                if (!cycleStartAt) {
                    countdownEl.textContent = "--";
                    progressBar.style.width = "0%";
                    return;
                }
                const now = Date.now();
                const elapsed = Math.max(0, now - cycleStartAt);
                const cycleIndex = Math.floor(elapsed / TTL_MS);

                // 每进入一个新周期就尝试拉取新二维码（不会导致页面重载）
                if (cycleIndex !== lastCycleIndex) {
                    lastCycleIndex = cycleIndex;
                    fetchQRCode({ forceHint: false });
                }

                const inCycleElapsed = elapsed % TTL_MS;
                const left = TTL_MS - inCycleElapsed;
                countdownEl.textContent = (left / 1000).toFixed(1) + "s";
                progressBar.style.width = ((left / TTL_MS) * 100).toFixed(2) + "%";

                // 如果超过 1 个周期仍未拿到新码，提示但不隐藏二维码（避免“整页刷新”观感）
                if (cycleIndex >= 1) {
                    statusText.textContent = "正在等待新二维码（自动刷新中）…";
                }
            }

            async function fetchQRCode({ forceHint } = { forceHint: false }) {
                if (!sign) {
                    statusText.textContent = "缺少 sign 参数";
                    renderWaiting();
                    return;
                }
                try {
                    const resp = await fetch("/qr/" + encodeURIComponent(sign), { method: "GET", cache: "no-store" });
                    const data = await safeReadJson(resp);
                    const qrUrl = data && data.qrUrl ? String(data.qrUrl) : "";

                    if (!qrUrl) {
                        if (forceHint || !lastQrUrl) {
                            statusText.textContent = "正在等待二维码生成（自动刷新中）…";
                            renderWaiting();
                        }
                        return;
                    }

                    if (qrUrl !== lastQrUrl) {
                        lastQrUrl = qrUrl;
                        renderQr(qrUrl);
                        // 只有二维码变化时才重置周期
                        cycleStartAt = Date.now();
                        lastCycleIndex = 0;
                        statusText.textContent = "二维码已更新（自动刷新中）";
                    } else {
                        // 二维码未变化：不重置周期，避免进度条跳回起点
                        if (!cycleStartAt) {
                            cycleStartAt = Date.now();
                            lastCycleIndex = 0;
                        }
                        statusText.textContent = "二维码有效期内（自动刷新中）";
                    }
                } catch (e) {
                    statusText.textContent = "获取二维码失败，请检查网络或后端日志";
                }
            }

            refreshBtn.addEventListener("click", () => fetchQRCode({ forceHint: true }));
            copyBtn.addEventListener("click", async () => {
                if (!lastQrUrl) return;
                try {
                    await navigator.clipboard.writeText(lastQrUrl);
                    statusText.textContent = "已复制二维码链接";
                } catch {
                    statusText.textContent = "复制失败：浏览器不允许或不支持剪贴板 API";
                }
            });

            // 初始化
            updateTime();

            // 如果带了 courseId，就先触发一次后端 WS 监听（避免服务重启/较晚打开导致一直无码）
            (async () => {
                if (course && sign) {
                    try {
                        await fetch(
                            "/qrws/start?courseId=" + encodeURIComponent(course) + "&signId=" + encodeURIComponent(sign),
                            { method: "GET", cache: "no-store" }
                        );
                    } catch {
                        // ignore
                    }
                }
            })();

            fetchQRCode({ forceHint: true });

            // 时间显示
            setInterval(updateTime, 1000);
            // 自动轮询二维码（解决“必须手动刷新才出现”）
            setInterval(fetchQRCode, 400);
            // 倒计时条
            setInterval(tickCountdown, 100);
        </script>
    </body>
</html>
